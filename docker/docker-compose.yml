version: '3.8'

services:
  drupal:
    image: austinodocker/drupal-app:v1
    ports:
      - "8080:80"
    environment:
      - DB_HOST=db
      - DB_NAME=drupaldb
      - DB_USER=drupaladmin
      - DB_PASSWORD=DrupalPass123!
    volumes:
      - drupal-files:/var/www/html/sites/default/files
    depends_on:
      - db
    restart: always

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: drupaldb
      MYSQL_USER:drupaladmin
      MYSQL_PASSWORD: DrupalPass123!
    volumes:
      - db-data:/var/lib/mysql
    restart: always

volumes:
  drupal-files:
  db-data:
